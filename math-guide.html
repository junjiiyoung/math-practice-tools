    <h1>3. 접선의 방정식</h1>

<script>
// 💡 교사 개편안 적용 마스터 데이터베이스 (calcSteps 가변화 및 표준 용어 정제 완료)
const problemDB = {
    prob1_1: {
        text: `1. 다음 곡선 위의 주어진 점에서의 접선의 방정식을 구하시오.<br>(1) 곡선 <span class="hl-given">$y = x^2 - 3x + 1$</span> 위의 주어진 <span class="hl-given">점 $(1, -1)$</span>에서의 <span class="hl-target" id="tg">접선의 방정식</span>`,
        targetHint: `접선의 방정식을 구하기 위해서는 직선의 구성 요소인 <strong>[접점의 좌표]</strong>와 <strong>[접선의 기울기]</strong>가 필요합니다. 문제에서 접점 $(1, -1)$을 알려주었으므로, 이제 우리의 핵심 목표는 접선의 <strong>기울기</strong>를 구하는 것입니다.`,
        givenHint: `• 곡선의 식이 구체적으로 주어져 있습니다. $f(x) = x^2 - 3x + 1$<br>
                    • 곡선 $y=f(x)$ 위의 지나는 점인 접점의 좌표 $(1, -1)$이 주어졌습니다.`,
        level1Hint: `"조건에 <strong>'곡선 위의 점'</strong>이라는 핵심 단어가 있네? 접선의 기울기는 우리가 배운 기하학적 개념 중 무엇과 완전히 동일한 정의일까?"`,
        level2Hint: `그렇지! 곡선 $y=f(x)$ 위 $x=a$에서의 접선의 기울기는 함수를 미분해서 대입한 <strong>미분계수 $f'(a)$</strong>와 같습니다. 즉, 도함수 $f'(x)$를 구한 뒤 $x=1$을 대입하면 접선의 기울기를 구할 수 있습니다.`,
        calcQuestion: `수행 단계 중 가이드가 필요한 연산 구간을 선택해 보세요.`,
        calcSteps: [
            {
                title: "1. 곡선의 식을 미분하여 도함수 $f'(x)$를 구하는 과정이 막혀요.",
                hint: "교과서에서 배운 다항함수의 미분 공식($(x^n)' = nx^{n-1}$)에 의해 함수 $f(x) = x^2 - 3x + 1$을 미분하면 도함수는 $f'(x) = 2x - 3$이 됩니다."
            },
            {
                title: "2. 구한 도함수에 접점의 x좌표를 대입하여 기울기 값을 계산하기 헷갈려요.",
                hint: "구해둔 도함수 $f'(x) = 2x - 3$의 $x$ 자리에 접점의 $x$좌표인 $1$을 대입하여 계산합니다.<br>$$f'(1) = 2 \\times 1 - 3 = -1$$<br>따라서 접선의 기울기는 $\\mathbf{-1}$이 됩니다."
            },
            {
                title: "3. 구한 기울기와 접점을 직선의 방정식 공식에 대입하여 정리하는 과정이 막혀요.",
                hint: "구한 접선의 기울기 $m=f'(1)=-1$과 접점의 좌표 $(1, -1)$을 접선의 방정식 공식 $y-f(a)=f'(a)(x-a)$에 대입합니다.<br>$$y - (-1) = -1(x - 1) \\rightarrow y + 1 = -x + 1$$<br>이를 정리하면 최종 접선의 방정식인 $y = -x$가 유도됩니다."
            }
        ],
        // 💡 선생님 요청 사항 반영: 객관식을 제거하고 교과서 표준 용어 주관식 단답형 폼으로 변경 완료
        quizType: "short",
        quizQuestion: `함수 $y=f(x)$ 위의 점 $(a, f(a))$에서의 접선의 기울기는 $x=a$에서의 [이것]과 같습니다. 빈칸에 들어갈 올바른 수학적 용어를 입력하세요.`,
        ans: `미분계수`,
        reviewText: `"곡선 위의 점이 주어지는 접선 문제는 함수를 미분하여 도함수를 구한 뒤, 접점의 x좌표를 대입하면 접선의 기울기를 곧바로 얻을 수 있다!"`
    },
    prob1_2: {
        text: `1. 다음 곡선 위의 주어진 점에서의 접선의 방정식을 구하시오.<br>(2) 곡선 <span class="hl-given">$y = x^3 - x - 3$</span> 위의 주어진 <span class="hl-given">점 $(2, 3)$</span>에서의 <span class="hl-target" id="tg">접선의 방정식</span>`,
        targetHint: `접선의 방정식을 구하기 위해서는 직선의 구성 요소인 <strong>[접점의 좌표]</strong>와 <strong>[접선의 기울기]</strong>가 필요합니다. 문제에서 접점 $(2, 3)$을 알려주었으므로, 이제 우리의 핵심 목표는 접선의 <strong>기울기</strong>를 구하는 것입니다.`,
        givenHint: `• 다항함수 3차 곡선의 식 $f(x) = x^3 - x - 3$이 주어졌습니다.<br>
                    • 곡선 $y=f(x)$ 위의 지나는 점인 접점의 좌표 $(2, 3)$이 주어졌습니다.`,
        level1Hint: `"함수의 차수가 3차로 높아지더라도 구하는 원리는 동일합니다. '곡선 위의 점에서의 접선'이라는 단서를 활용하여 접선의 기울기를 구하려면 어떤 단계를 밟아야 할까요?"`,
        level2Hint: `정확하게 기억하고 있네요. 곡선의 식을 미분하여 도함수를 구한 뒤, 접점의 $x$좌표인 $x = 2$를 대입하면 우리가 원하는 접선의 기울기 $f'(2)$를 구할 수 있습니다.`,
        calcQuestion: `3차 다항함수의 미분 수행 단계 중 가이드가 필요한 취약 구간을 정밀하게 선택해 보세요.`,
        calcSteps: [
            {
                title: "1. 곡선의 식을 미분하여 도함수 $f'(x)$를 구하는 과정이 막혀요.",
                hint: "교과서에서 배운 $x^n$의 미분 공식($(x^n)' = nx^{n-1}$)과 함수의 실수배, 합, 차의 미분법에 의해 $f(x) = x^3 - x - 3$을 미분한 도함수는 $f'(x) = 3x^2 - 1$이 됩니다. 상수항 $-3$은 미분하면 $0$이 됨에 유의하세요."
            },
            {
                title: "2. 구한 도함수에 접점의 x좌표를 대입하여 기울기 값을 계산하기 헷갈려요.",
                hint: "구해둔 도함수 $f'(x) = 3x^2 - 1$의 $x$ 자리에 접점의 $x$좌표인 $2$를 대입하여 계산합니다.<br>$$f'(2) = 3 \\times 2^2 - 1 = 12 - 1 = 11$$<br>따라서 접선의 기울기는 $\\mathbf{11}$이 됩니다."
            },
            {
                // 💡 선생님 요청 사항 완벽 반영: m=f'(2)=11 명시, 접선의 방정식 표준 공식 대입 및 서술 정제 완료
                title: "3. 구한 기울기와 접점을 직선의 방정식 공식에 대입하여 정리하는 과정이 막혀요.",
                hint: "구한 접선의 기울기 $m=f'(2)=11$과 접점의 좌표 $(2, 3)$을 접선의 방정식 공식 $y-f(a)=f'(a)(x-a)$에 대입합니다.<br>$$y - 3 = 11(x - 2)$$<br>이를 정리하면 최종 접선의 방정식인 $y = 11x - 19$가 유도됩니다."
            }
        ],
        quizType: "choice",
        quizQuestion: `함수의 차수가 2차에서 3차, 4차로 올라가더라도 접점의 $x$좌표를 대입하여 접선의 기울기를 찾아내는 대상이 되는 '함수'는 무엇인가요?`,
        quizOptions: ["원래 함수", "도함수"],
        ans: `도함수`,
        reviewText: `"다항함수의 차수가 아무리 높아져도, 접점의 x좌표를 도함수에 대입하여 접선의 기울기를 구한다는 본질은 항상 동일하다!"`
    },
    prob2: {

let hasCheckedTarget = false;
let hasCheckedGiven = false;

function loadProblem() {
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    
    document.getElementById("problemText").innerHTML = data.text;
    
    const stages = document.querySelectorAll('.stage');
    stages.forEach(st => st.classList.remove('active'));
    document.getElementById("stage1").classList.add('active');
    
    hasCheckedTarget = false;
    hasCheckedGiven = false;
    document.getElementById("stage1ActionGroup").style.display = "block";
    document.getElementById("stage1DefaultText").style.display = "block";
    document.getElementById("targetPanel").innerHTML = "";
    document.getElementById("givenPanel").innerHTML = "";
    document.getElementById("stage1NextSpace").innerHTML = "";
    
    removeHighlights();
    refreshMath("problemText");
}

function removeHighlights() {
    document.getElementById("tg")?.classList.remove("active-target");
    document.querySelectorAll('.hl-given').forEach(el => el.classList.remove('active-given'));
}

function triggerTarget() {
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    
    document.getElementById("tg").classList.add("active-target");
    const targetWord = document.getElementById("tg") ? document.getElementById("tg").innerText : "최종 목표";
    hasCheckedTarget = true;
    
    document.getElementById("targetPanel").innerHTML = `
        <div style="background: rgba(244, 63, 94, 0.08); border: 1px solid rgba(244, 63, 94, 0.2); padding: 12px 15px; border-radius: 8px; color: #fda4af; animation: slideDown 0.3s ease-in-out; margin-bottom: 5px;">
            🎯 <strong>구하고자 하는 최종 목표:</strong> <span style="text-decoration: underline; font-weight: bold; color: #fff;">[${targetWord}]</span><br>
            <span style="font-size:0.95em; color:#cbd5e1; display:block; margin-top:5px;">${data.targetHint}</span>
        </div>
    `;
    refreshMath("targetPanel");
    checkStage1Completion(); 
}

function triggerGiven() {
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    
    document.querySelectorAll('.hl-given').forEach(el => el.classList.add('active-given'));
    hasCheckedGiven = true;
    
    // 💡 [선생님 피드백 반영] '주어진 조건' 명칭 정제 타이틀 출력
    document.getElementById("givenPanel").innerHTML = `
        <div style="background: rgba(234, 179, 8, 0.06); border: 1px solid rgba(234, 179, 8, 0.2); padding: 12px 15px; border-radius: 8px; color: #fef08a; animation: slideDown 0.3s ease-in-out;">
            💛 <strong>문제에서 주어진 조건:</strong><br>
            <span style="font-size:0.95em; color:#cbd5e1; display:block; margin-top:5px;">${data.givenHint}</span>
        </div>
    `;
    refreshMath("givenPanel");
    checkStage1Completion(); 
}

function checkStage1Completion() {
    if (hasCheckedTarget && hasCheckedGiven) {
        document.getElementById("stage1ActionGroup").style.display = "none";
        document.getElementById("stage1DefaultText").style.display = "none";
        
        document.getElementById("stage1NextSpace").innerHTML = `
            <div class="tip-box" style="margin-bottom:10px; animation: slideDown 0.3s ease;">
                ✓ 문제 분석이 완료되었습니다! 목표와 주어진 조건을 모두 확인했으니 이제 생각의 연결 고리를 연결하러 가봅시다.
            </div>
            <button class="btn btn-next" onclick="openStage2()">2단계: 핵심 발상 단계로 진입 ➔</button>
        `;
        focusScroll();
    }
}

function openStage2() {
    const currentKey = document.getElementById("probSelect").value;

    const container = document.getElementById("stage2Content");
    container.innerHTML = `
        <p style="margin-top:5px; font-weight:bold; color:#38bdf8;">💡 [상호작용 질문] 방금 분석한 조건들을 보고 어떤 개념으로 연결을 시작할지 감이 오시나요?</p>

}

            <button class="btn btn-branch" style="display:inline-flex; width:auto;" onclick="bypassToStage3()">힌트 얻었어! 내 힘으로 식 세우러 가기 ➔</button>

function runStage2Level2() {

        </div>
    `;
    
    document.getElementById("stage2BtnGroup").innerHTML = `
        <button class="btn btn-next" onclick="runStage3()">문제 해결 단계로 진입 ➔</button>
    `;

function bypassToStage3() {

// 💡 3단계: 문제 해결 (Do) 엔진 및 부연설명 자동 가변 패치
function runStage3() {
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    const container = document.getElementById("stage3Content");
    
    let stepButtonsHtml = "";
    data.calcSteps.forEach((step, index) => {
        stepButtonsHtml += `
            <button class="btn btn-branch" onclick="showCalcHint(${index})">
                ${step.title}
            </button>
        `;
    });
    
    // 💡 [선생님 피드백 반영] ※ 기호 가이드 문구를 가변 힌트 구조에 최적화하여 갱신
    container.innerHTML = `
        <p style="font-weight:500; margin-bottom:10px;">"방향은 잡았는데 연산 도중 길을 잃었나요? 해결 과정 중 막힌 지점을 선택해 보세요."</p>
        <div style="color:#94a3b8; font-size:0.95em; margin-bottom:12px;">※ 선택한 구역에 따라 단계별 연산 가이드가 제공됩니다.</div>
        
        <div class="calc-btn-group">${stepButtonsHtml}</div>
        
        <div id="calcDiagnosticPanel" style="margin-top:15px;"></div>
        <br><button class="btn btn-next" id="toStage4Btn" style="display:none;" onclick="runStage4()">연산 완료! 최종 사고력 마감 퀴즈 풀기 ➔</button>
    `;
    document.getElementById("stage3").classList.add("active");
    refreshMath("stage3Content");
    focusScroll();
}

function showCalcHint(index) {
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    const panel = document.getElementById("calcDiagnosticPanel");
    
    const targetHintText = data.calcSteps[index].hint;
    const borderColor = index % 2 === 0 ? "rgba(99,102,241,0.2)" : "rgba(16,185,129,0.2)";
    const bgColor = index % 2 === 0 ? "rgba(99,102,241,0.05)" : "rgba(16,185,129,0.05)";
    
    panel.innerHTML = `
        <div class="caution-box" style="animation: slideDown 0.3s ease; background:${bgColor}; border-color:${borderColor}; color:#cbd5e1;">
            🔍 <strong>상세 진단 피드백:</strong><br>${targetHintText}
        </div>
    `;
    
    document.getElementById("toStage4Btn").style.display = "inline-flex";
    refreshMath("calcDiagnosticPanel");
    focusScroll();
}

function runStage4() {
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    const container = document.getElementById("stage4Content");
    
    let quizHtml = "";
    if (data.quizType === "choice") {
        quizHtml += `<div class="quiz-panel">`;
        data.quizOptions.forEach((optionText, index) => {
            const uid = "opt_" + index;
            quizHtml += `<div class="quiz-option" id="${uid}" onclick="checkQuizAnswer('${uid}', '${optionText}', '${data.ans}', 'choice')">${optionText}</div>`;
        });
        quizHtml += `</div>`;
    } 
    else if (data.quizType === "short") {
        quizHtml += `
            <div style="margin: 15px 0; display: flex; align-items: center; flex-wrap: wrap;">
                <input type="text" id="shortAnswerInput" class="quiz-input" placeholder="정답을 입력하세요" onkeydown="if(event.key === 'Enter') submitShortAnswer()">
                <button class="btn btn-quiz" style="margin-top:10px;" onclick="submitShortAnswer()">정답 제출하기 ➔</button>
            </div>
        `;
    }
    
    container.innerHTML = `
        <p style="font-weight:600; color:#a7f3d0; margin-bottom:10px;">🎉 대단합니다! 해설지에 의존하지 않고 스스로의 힘으로 문제를 완벽하게 해결했습니다.</p>
        <p style="font-size:0.95em; color:#94a3b8; margin-bottom:15px;">마지막으로 오늘 훈련한 핵심 개념을 정리하기 위한 확인 퀴즈를 풀어보세요.</p>
        
        <div style="background:rgba(255,255,255,0.02); padding:15px; border-radius:10px; border:1px solid rgba(255,255,255,0.06);">
            <p style="font-weight:500; color:#fff;">❓ ${data.quizQuestion}</p>
            ${quizHtml}
            <div id="quizFeedbackPanel" style="margin-top:10px; font-weight:bold;"></div>
        </div>
    `;
    
    document.getElementById("stage4").classList.add("active");
    refreshMath("stage4Content");
    focusScroll();
}

function submitShortAnswer() {
    const inputEl = document.getElementById("shortAnswerInput");
    const userAnswer = inputEl.value.trim();
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    
    checkQuizAnswer("shortAnswerInput", userAnswer, data.ans, "short");
}

// 💡 4단계: 반성 및 피드백 전용 정오 연산 엔진 (★선생님 지침대로 오직 단정하게 교과서 표준 피드백만 출력!)
function checkQuizAnswer(elementId, selectedVal, correctVal, type) {
    const feedback = document.getElementById("quizFeedbackPanel");
    const currentKey = document.getElementById("probSelect").value;
    const data = problemDB[currentKey];
    
    if (type === "choice") {
        document.querySelectorAll('.quiz-option').forEach(el => el.classList.remove('correct', 'wrong'));
    }
    
    if (selectedVal === correctVal || (type === "short" && selectedVal.replace(/\s+/g, '') === correctVal.replace(/\s+/g, ''))) {
        if (type === "choice") {
            document.getElementById(elementId).classList.add('correct');
        }
        
        // 💡 [선생님 피드백 완벽 반영] 지저분한 비교 배너 소거 후 단일화된 고해상도 교과서 가이드 박스 마감
        feedback.innerHTML = `
            <div class="tip-box" style="animation: slideDown 0.3s ease; margin-top:10px; background: rgba(56, 189, 248, 0.06); border: 1px solid rgba(56, 189, 248, 0.25);">
                🎯 정답입니다! 오늘 연마한 학습 회로가 바르게 마감되었습니다.<br><br>
                
                🚩 <strong>📌 꼭 기억해야 하는 피드백:</strong><br>
                <span style="display:block; margin-top:8px; color:#fff; font-size:1.02em; font-weight:bold; line-height:1.6;">${data.reviewText}</span>
            </div>
        `;
    } 
    else {
        if (type === "choice") {
            document.getElementById(elementId).classList.add('wrong');
        }
        feedback.innerHTML = `<span style="color:#ef4444; margin-left:5px; font-size:0.95em; display:block; margin-top:8px;">❌ 앗! 생각의 고리가 살짝 꼬였습니다. 다시 한번 1~3단계의 단서와 가이드를 천천히 복기하여 정답을 골라보세요.</span>`;
    }
    refreshMath("quizFeedbackPanel");
    setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 80);
}

function focusScroll() {
    setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 100);
}

function refreshMath(elementId) {
    if (typeof renderMathInElement === "function") {
        renderMathInElement(document.getElementById(elementId), {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError : false
        });
    }
}
