<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도함수의 부호와 함수의 변화</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .graphs-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            .graphs-container {
                grid-template-columns: 1fr;
            }
        }
        
        .graph-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .graph-title {
            font-size: 1.1em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .graph-title .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .derivative-dot { background: #00d4ff; }
        .original-dot { background: #ff6b6b; }
        
        .coeff-toggle {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        
        .coeff-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #8892b0;
            padding: 3px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .coeff-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #c4b5fd;
        }
        
        .coeff-btn.active {
            background: rgba(0, 212, 255, 0.25);
            border-color: #00d4ff;
            color: #fff;
        }
        
        canvas {
            width: 100%;
            background: #0a0a1a;
            border-radius: 12px;
            cursor: grab;
        }
        
        canvas:active {
            cursor: grabbing;
        }
        
        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .equations {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 600px) {
            .equations {
                grid-template-columns: 1fr;
            }
        }
        
        .equation-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .equation-label {
            font-size: 0.85em;
            color: #8892b0;
            margin-bottom: 8px;
        }
        
        .equation {
            font-size: 1.1em;
            font-family: 'Cambria Math', 'Times New Roman', serif;
        }
        
        .analysis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .analysis-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
        }
        
        .analysis-item h4 {
            font-size: 0.85em;
            color: #8892b0;
            margin-bottom: 8px;
        }
        
        .analysis-item p {
            font-size: 0.95em;
        }
        
        .increase { color: #f87171; }
        .decrease { color: #4ade80; }
        .extrema { color: #fbbf24; }
        
        .trend-up, .trend-down {
            display: inline-flex;
            align-items: flex-end;
            gap: 2px;
            height: 1.1em;
            vertical-align: middle;
            margin-right: 4px;
        }
        .trend-up::before, .trend-up::after,
        .trend-down::before, .trend-down::after {
            content: '';
            width: 5px;
            border-radius: 1px;
        }
        .trend-up::before  { height: 0.5em; background: #f87171; }
        .trend-up::after   { height: 1em;   background: #f87171; }
        .trend-down::before { height: 1em;   background: #00d4ff; }
        .trend-down::after  { height: 0.5em; background: #00d4ff; }
        
        .triangle-down-icon {
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 0.45em solid transparent;
            border-right: 0.45em solid transparent;
            border-top: 0.65em solid #00d4ff;
            vertical-align: middle;
            margin-right: 4px;
        }
        
        .instructions {
            text-align: center;
            padding: 15px;
            background: rgba(123, 47, 247, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #c4b5fd;
        }
        
        .vertex-marker {
            position: absolute;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>도함수의 부호와 함수의 변화</h1>
        <p class="subtitle">이차함수(도함수)의 꼭짓점을 드래그하여 삼차함수(원함수)의 변화를 관찰하세요</p>
        
        <div class="instructions">
            💡 <strong>사용법:</strong> 왼쪽 그래프에서 <span style="color: #00d4ff;">파란 점(꼭짓점)</span>을 드래그하면 도함수가 변하고, 오른쪽의 원함수도 함께 변합니다.
        </div>
        
        <div class="graphs-container">
            <div class="graph-box">
                <div class="graph-title">
                    <span class="dot derivative-dot"></span>
                    도함수 f'(x) - 이차함수
                    <div class="coeff-toggle">
                        <button id="coeffPos" class="coeff-btn active">a = 3</button>
                        <button id="coeffNeg" class="coeff-btn">a = -3</button>
                    </div>
                </div>
                <canvas id="derivativeCanvas" width="500" height="400"></canvas>
            </div>
            <div class="graph-box">
                <div class="graph-title">
                    <span class="dot original-dot"></span>
                    원함수 f(x) - 삼차함수 (단, 상수항은 1)
                </div>
                <canvas id="originalCanvas" width="500" height="400"></canvas>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="equations">
                <div class="equation-box">
                    <div class="equation-label">도함수 (이차함수)</div>
                    <div class="equation" id="derivativeEq"></div>
                </div>
                <div class="equation-box">
                    <div class="equation-label">원함수 (삼차함수)</div>
                    <div class="equation" id="originalEq"></div>
                </div>
            </div>
            
            <div class="analysis">
                <div class="analysis-item">
                    <h4><span class="trend-up"></span>증가 구간</h4>
                    <p class="increase" id="increaseInterval"></p>
                </div>
                <div class="analysis-item">
                    <h4><span class="trend-down"></span>감소 구간</h4>
                    <p class="decrease" id="decreaseInterval"></p>
                </div>
                <div class="analysis-item">
                    <h4><span style="color:#f87171">▲</span> 극대</h4>
                    <p class="extrema" id="localMax"></p>
                </div>
                <div class="analysis-item">
                    <h4><span class="triangle-down-icon"></span>극소</h4>
                    <p class="extrema" id="localMin"></p>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 캔버스 설정
        const derivCanvas = document.getElementById('derivativeCanvas');
        const origCanvas = document.getElementById('originalCanvas');
        const derivCtx = derivCanvas.getContext('2d');
        const origCtx = origCanvas.getContext('2d');
        
        // 고해상도 디스플레이 지원
        function setupCanvas(canvas, ctx) {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            return { width: rect.width, height: rect.height };
        }
        
        let derivSize, origSize;
        
        // 도함수 파라미터 (f'(x) = a(x - h)² + k 형태)
        let vertex = { x: 0, y: -1 }; // 꼭짓점 (h, k)
        let a = 3; // 이차항 계수 (기본 3, 버튼으로 -3 전환)
        
        // 그래프 설정
        const scale = 40; // 픽셀/단위
        let isDragging = false;
        
        // 좌표 변환 함수
        function toCanvasX(x, width) {
            return width / 2 + x * scale;
        }
        
        function toCanvasY(y, height) {
            return height / 2 - y * scale;
        }
        
        function toMathX(canvasX, width) {
            return (canvasX - width / 2) / scale;
        }
        
        function toMathY(canvasY, height) {
            return (height / 2 - canvasY) / scale;
        }
        
        // 도함수 계산: f'(x) = a(x - h)² + k
        function derivative(x) {
            return a * Math.pow(x - vertex.x, 2) + vertex.y;
        }
        
        // 원함수 계산: f(x) = (a/3)(x - h)³ + kx + 1 + a·h³/3 (f(0)=1 고정)
        function original(x) {
            const h = vertex.x;
            return (a / 3) * Math.pow(x - h, 3) + vertex.y * x + 1 + (a / 3) * Math.pow(h, 3);
        }
        
        // 도함수의 근 계산 (f'(x) = 0인 점)
        function findRoots() {
            // a(x - h)² + k = 0
            // (x - h)² = -k/a
            if (vertex.y / a > 0) return []; // 실근 없음
            if (vertex.y === 0) return [vertex.x]; // 중근
            
            const discriminant = -vertex.y / a;
            const sqrtDisc = Math.sqrt(discriminant);
            return [vertex.x - sqrtDisc, vertex.x + sqrtDisc].sort((a, b) => a - b);
        }
        
        // 그리드 그리기
        function drawGrid(ctx, width, height) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            
            // 수직선
            for (let x = -10; x <= 10; x++) {
                const cx = toCanvasX(x, width);
                ctx.beginPath();
                ctx.moveTo(cx, 0);
                ctx.lineTo(cx, height);
                ctx.stroke();
            }
            
            // 수평선
            for (let y = -10; y <= 10; y++) {
                const cy = toCanvasY(y, height);
                ctx.beginPath();
                ctx.moveTo(0, cy);
                ctx.lineTo(width, cy);
                ctx.stroke();
            }
            
            // 축
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            
            // x축
            ctx.beginPath();
            ctx.moveTo(0, height / 2);
            ctx.lineTo(width, height / 2);
            ctx.stroke();
            
            // y축
            ctx.beginPath();
            ctx.moveTo(width / 2, 0);
            ctx.lineTo(width / 2, height);
            ctx.stroke();
            
            // 축 레이블
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '12px sans-serif';
            ctx.fillText('x', width - 15, height / 2 - 10);
            ctx.fillText('y', width / 2 + 10, 15);
        }
        
        // 도함수 그래프 그리기
        function drawDerivative() {
            const width = derivSize.width;
            const height = derivSize.height;
            
            derivCtx.clearRect(0, 0, width, height);
            drawGrid(derivCtx, width, height);
            
            // y = 0 기준선 강조
            derivCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            derivCtx.setLineDash([5, 5]);
            derivCtx.beginPath();
            derivCtx.moveTo(0, height / 2);
            derivCtx.lineTo(width, height / 2);
            derivCtx.stroke();
            derivCtx.setLineDash([]);
            
            // 도함수 그래프
            derivCtx.strokeStyle = '#00d4ff';
            derivCtx.lineWidth = 3;
            derivCtx.beginPath();
            
            let started = false;
            for (let px = 0; px < width; px++) {
                const x = toMathX(px, width);
                const y = derivative(x);
                const py = toCanvasY(y, height);
                
                if (py > -100 && py < height + 100) {
                    if (!started) {
                        derivCtx.moveTo(px, py);
                        started = true;
                    } else {
                        derivCtx.lineTo(px, py);
                    }
                }
            }
            derivCtx.stroke();
            
            // x축 위/아래 바탕색
            derivCtx.globalAlpha = 0.12;
            derivCtx.fillStyle = '#f87171';
            derivCtx.fillRect(0, 0, width, height / 2);
            derivCtx.fillStyle = '#00d4ff';
            derivCtx.fillRect(0, height / 2, width, height / 2);
            derivCtx.globalAlpha = 1;
            
            // 근 표시
            const roots = findRoots();
            roots.forEach(root => {
                const rx = toCanvasX(root, width);
                const ry = height / 2;
                
                derivCtx.fillStyle = '#fbbf24';
                derivCtx.beginPath();
                derivCtx.arc(rx, ry, 6, 0, Math.PI * 2);
                derivCtx.fill();
            });
            
            // 꼭짓점 (드래그 포인트)
            const vx = toCanvasX(vertex.x, width);
            const vy = toCanvasY(vertex.y, height);
            
            // 글로우 효과
            const gradient = derivCtx.createRadialGradient(vx, vy, 0, vx, vy, 20);
            gradient.addColorStop(0, 'rgba(0, 212, 255, 0.5)');
            gradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
            derivCtx.fillStyle = gradient;
            derivCtx.beginPath();
            derivCtx.arc(vx, vy, 20, 0, Math.PI * 2);
            derivCtx.fill();
            
            // 꼭짓점 원
            derivCtx.fillStyle = '#00d4ff';
            derivCtx.strokeStyle = '#fff';
            derivCtx.lineWidth = 2;
            derivCtx.beginPath();
            derivCtx.arc(vx, vy, 10, 0, Math.PI * 2);
            derivCtx.fill();
            derivCtx.stroke();
            
            // 꼭짓점 좌표 표시
            derivCtx.fillStyle = '#fff';
            derivCtx.font = '14px sans-serif';
            derivCtx.fillText(`(${vertex.x.toFixed(1)}, ${vertex.y.toFixed(1)})`, vx + 15, vy - 15);
        }
        
        // 원함수 그래프 그리기
        function drawOriginal() {
            const width = origSize.width;
            const height = origSize.height;
            
            origCtx.clearRect(0, 0, width, height);
            drawGrid(origCtx, width, height);
            
            // 원함수 그래프
            origCtx.strokeStyle = '#ff6b6b';
            origCtx.lineWidth = 3;
            origCtx.beginPath();
            
            let started = false;
            for (let px = 0; px < width; px++) {
                const x = toMathX(px, width);
                const y = original(x);
                const py = toCanvasY(y, height);
                
                if (py > -100 && py < height + 100) {
                    if (!started) {
                        origCtx.moveTo(px, py);
                        started = true;
                    } else {
                        origCtx.lineTo(px, py);
                    }
                } else {
                    started = false;
                }
            }
            origCtx.stroke();
            
            // 극값/변곡점 표시
            const roots = findRoots();
            roots.forEach((root, index) => {
                const ex = toCanvasX(root, width);
                const ey = toCanvasY(original(root), height);
                
                if (ey > 0 && ey < height) {
                    const yVal = original(root);
                    const fmt = (v) => parseFloat(v.toFixed(2)).toString();
                    
                    if (roots.length === 1) {
                        // 변곡점 (좌표만 표시)
                        origCtx.fillStyle = '#fbbf24';
                        origCtx.beginPath();
                        origCtx.arc(ex, ey, 8, 0, Math.PI * 2);
                        origCtx.fill();
                        origCtx.fillStyle = '#fff';
                        origCtx.font = '17px sans-serif';
                        origCtx.fillText(`(${fmt(root)}, ${fmt(yVal)})`, ex + 10, ey - 10);
                    } else {
                        // 극대/극소 판정
                        const isMax = (a > 0 && index === 0) || (a < 0 && index === 1);
                        
                        origCtx.fillStyle = isMax ? '#4ade80' : '#fbbf24';
                        origCtx.beginPath();
                        origCtx.arc(ex, ey, 8, 0, Math.PI * 2);
                        origCtx.fill();
                        
                        origCtx.fillStyle = '#fff';
                        origCtx.font = '17px sans-serif';
                        const label = isMax ? '극대' : '극소';
                        origCtx.fillText(`${label} (${fmt(root)}, ${fmt(yVal)})`, ex + 10, ey - 10);
                    }
                }
            });
            
            // 증가/감소 화살표 (그래프 근처, 화면 벗어나면 가장자리 고정)
            const margin = 30;
            function graphYof(mathX) {
                return toCanvasY(original(mathX), height);
            }
            function clamp(v) {
                return Math.max(margin, Math.min(height - margin, v));
            }
            
            if (roots.length === 2) {
                origCtx.font = '40px sans-serif';
                const r1 = roots[0];
                const r2 = roots[1];
                
                const lx = r1 - Math.max(1.5, (r2 - r1) * 0.4);
                const mx = (r1 + r2) / 2;
                const rx = r2 + Math.max(1.5, (r2 - r1) * 0.4);
                
                const leftX = toCanvasX(lx, width);
                const midX = toCanvasX(mx, width);
                const rightX = toCanvasX(rx, width);
                
                // 증가(↗) → 빨강, 감소(↘) → 파랑
                if (a > 0) {
                    origCtx.fillStyle = '#f87171';
                    origCtx.fillText('↗', leftX, clamp(graphYof(lx)));
                    origCtx.fillStyle = '#00d4ff';
                    origCtx.fillText('↘', midX, clamp(graphYof(mx)));
                    origCtx.fillStyle = '#f87171';
                    origCtx.fillText('↗', rightX, clamp(graphYof(rx)));
                } else {
                    origCtx.fillStyle = '#00d4ff';
                    origCtx.fillText('↘', leftX, clamp(graphYof(lx)));
                    origCtx.fillStyle = '#f87171';
                    origCtx.fillText('↗', midX, clamp(graphYof(mx)));
                    origCtx.fillStyle = '#00d4ff';
                    origCtx.fillText('↘', rightX, clamp(graphYof(rx)));
                }
            } else {
                // 근 0개 또는 1개: 단조 증감, 화살표 하나만 표시
                origCtx.font = '48px sans-serif';
                const cx = toCanvasX(0, width);
                const cy = clamp(graphYof(0));
                if (a > 0) {
                    origCtx.fillStyle = '#f87171';
                    origCtx.fillText('↗', cx, cy);
                } else {
                    origCtx.fillStyle = '#00d4ff';
                    origCtx.fillText('↘', cx, cy);
                }
            }
        }
        
        // 정보 패널 업데이트 (KaTeX, 전개형)
        function updateInfo() {
            const h = vertex.x;
            const vk = vertex.y;
            const aVal = a;

            const derivEq = document.getElementById('derivativeEq');
            const origEq = document.getElementById('originalEq');

            function fmtNum(v) {
                if (v === 0) return '0';
                const absV = Math.abs(v);
                const n4 = Math.round(absV * 4);
                if (Math.abs(absV * 4 - n4) < 1e-9 && n4 <= 4) {
                    const s = v < 0 ? '-' : '';
                    if (n4 === 4) return s + '1';
                    if (n4 === 2) return s + '\\frac{1}{2}';
                    if (n4 === 1) return s + '\\frac{1}{4}';
                    if (n4 === 3) return s + '\\frac{3}{4}';
                }
                const n3 = Math.round(absV * 3);
                if (Math.abs(absV * 3 - n3) < 1e-9 && (n3 === 1 || n3 === 2)) {
                    const s = v < 0 ? '-' : '';
                    return s + (n3 === 1 ? '\\frac{1}{3}' : '\\frac{2}{3}');
                }
                return (v < 0 ? '-' : '') + parseFloat(absV.toFixed(3)).toString();
            }

            // 전개 계수: f'(x) = a(x-h)² + k = ax² - 2ah x + (ah² + k)
            const A = aVal;
            const B = -2 * aVal * h;
            const C = aVal * h * h + vk;

            // 원함수: f(x) = ∫f'(x)dx = (a/3)x³ - ah x² + (ah²+k)x + 1 (f(0)=1)
            const X3 = aVal / 3;
            const X2 = -aVal * h;
            const X1 = aVal * h * h + vk;
            const X0 = 0;

            function addTerm(exp, coeff, varStr) {
                if (coeff === 0) return exp;
                const abs = fmtNum(Math.abs(coeff));
                const sign = coeff > 0 ? ' + ' : ' - ';
                if (abs === '1' && varStr !== '') return exp + sign + varStr;
                return exp + sign + abs + varStr;
            }

            function firstTerm(coeff, varStr) {
                if (coeff === 0) return '';
                const s = fmtNum(coeff);
                if (s === '1' && varStr !== '') return varStr;
                if (s === '-1' && varStr !== '') return '-' + varStr;
                return s + varStr;
            }

            // 도함수 (전개형)
            let derivLatex = "f'(x) = ";
            derivLatex += firstTerm(A, 'x^2');
            derivLatex = addTerm(derivLatex, B, 'x');
            derivLatex = addTerm(derivLatex, C, '');

            // 원함수 (전개형)
            let origLatex = 'f(x) = ';
            origLatex += firstTerm(X3, 'x^3');
            origLatex = addTerm(origLatex, X2, 'x^2');
            origLatex = addTerm(origLatex, X1, 'x');
            origLatex = addTerm(origLatex, X0, '');
            origLatex += ' + 1';

            const kOpt = { throwOnError: false, displayMode: false };
            if (typeof katex !== 'undefined') {
                katex.render(derivLatex, derivEq, kOpt);
                katex.render(origLatex, origEq, kOpt);
            } else {
                derivEq.textContent = derivLatex;
                origEq.textContent = origLatex;
            }

            // 구간 분석 (변경 없음)
            const roots = findRoots();
            const incEl = document.getElementById('increaseInterval');
            const decEl = document.getElementById('decreaseInterval');
            const maxEl = document.getElementById('localMax');
            const minEl = document.getElementById('localMin');

            if (roots.length === 0) {
                incEl.textContent = vk > 0 ? '(-∞, +∞)' : '없음';
                decEl.textContent = vk > 0 ? '없음' : '(-∞, +∞)';
                maxEl.textContent = '없음';
                minEl.textContent = '없음';
            } else if (roots.length === 1) {
                if (a > 0) {
                    incEl.textContent = '(-∞, +∞)';
                    decEl.textContent = '없음';
                } else {
                    incEl.textContent = '없음';
                    decEl.textContent = '(-∞, +∞)';
                }
                maxEl.textContent = '없음';
                minEl.textContent = '없음';
            } else {
                const r1 = roots[0];
                const r2 = roots[1];
                const y1 = original(r1);
                const y2 = original(r2);

                const fr = (v) => parseFloat(v.toFixed(2)).toString();

                let incLatex, decLatex, maxLatex, minLatex;
                if (a > 0) {
                    incLatex = `(-\\infty, ${fr(r1)}) \\cup (${fr(r2)}, +\\infty)`;
                    decLatex = `(${fr(r1)}, ${fr(r2)})`;
                    maxLatex = `x = ${fr(r1)},\\; f(x) = ${fr(y1)}`;
                    minLatex = `x = ${fr(r2)},\\; f(x) = ${fr(y2)}`;
                } else {
                    incLatex = `(${fr(r1)}, ${fr(r2)})`;
                    decLatex = `(-\\infty, ${fr(r1)}) \\cup (${fr(r2)}, +\\infty)`;
                    maxLatex = `x = ${fr(r2)},\\; f(x) = ${fr(y2)}`;
                    minLatex = `x = ${fr(r1)},\\; f(x) = ${fr(y1)}`;
                }

                if (typeof katex !== 'undefined') {
                    katex.render(incLatex, incEl, { throwOnError: false, displayMode: false });
                    katex.render(decLatex, decEl, { throwOnError: false, displayMode: false });
                    katex.render(maxLatex, maxEl, { throwOnError: false, displayMode: false });
                    katex.render(minLatex, minEl, { throwOnError: false, displayMode: false });
                } else {
                    incEl.textContent = incLatex;
                    decEl.textContent = decLatex;
                    maxEl.textContent = maxLatex;
                    minEl.textContent = minLatex;
                }
            }
        }
        
        // 전체 다시 그리기
        function draw() {
            drawDerivative();
            drawOriginal();
            updateInfo();
        }
        
        // 마우스 이벤트 처리
        function getMousePos(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }
        
        function isNearVertex(pos) {
            const vx = toCanvasX(vertex.x, derivSize.width);
            const vy = toCanvasY(vertex.y, derivSize.height);
            const dist = Math.sqrt(Math.pow(pos.x - vx, 2) + Math.pow(pos.y - vy, 2));
            return dist < 20;
        }
        
        derivCanvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(derivCanvas, e);
            if (isNearVertex(pos)) {
                isDragging = true;
                derivCanvas.style.cursor = 'grabbing';
            }
        });
        
        derivCanvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(derivCanvas, e);
            
            if (isDragging) {
                vertex.x = Math.round(toMathX(pos.x, derivSize.width) * 4) / 4;
                vertex.y = Math.round(toMathY(pos.y, derivSize.height) * 4) / 4;
                
                // 범위 제한
                vertex.x = Math.max(-4, Math.min(4, vertex.x));
                vertex.y = Math.max(-4, Math.min(4, vertex.y));
                
                draw();
            } else {
                derivCanvas.style.cursor = isNearVertex(pos) ? 'grab' : 'default';
            }
        });
        
        derivCanvas.addEventListener('mouseup', () => {
            isDragging = false;
            derivCanvas.style.cursor = 'grab';
        });
        
        derivCanvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        // 터치 이벤트 지원
        derivCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const pos = getMousePos(derivCanvas, touch);
            if (isNearVertex(pos)) {
                isDragging = true;
            }
        });
        
        derivCanvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const touch = e.touches[0];
                const pos = getMousePos(derivCanvas, touch);
                
                vertex.x = Math.round(toMathX(pos.x, derivSize.width) * 4) / 4;
                vertex.y = Math.round(toMathY(pos.y, derivSize.height) * 4) / 4;
                
                vertex.x = Math.max(-4, Math.min(4, vertex.x));
                vertex.y = Math.max(-4, Math.min(4, vertex.y));
                
                draw();
            }
        });
        
        derivCanvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // 계수 토글 버튼
        document.getElementById('coeffPos').addEventListener('click', () => {
            a = 3;
            document.getElementById('coeffPos').classList.add('active');
            document.getElementById('coeffNeg').classList.remove('active');
            draw();
        });
        document.getElementById('coeffNeg').addEventListener('click', () => {
            a = -3;
            document.getElementById('coeffNeg').classList.add('active');
            document.getElementById('coeffPos').classList.remove('active');
            draw();
        });

        // 초기화
        function init() {
            derivSize = setupCanvas(derivCanvas, derivCtx);
            origSize = setupCanvas(origCanvas, origCtx);
            draw();
        }
        
        // 리사이즈 대응
        window.addEventListener('resize', () => {
            setTimeout(init, 100);
        });
        
        init();
    </script>
</body>
</html>
